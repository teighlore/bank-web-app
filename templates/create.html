<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="card">
    <h2>Create Account</h2>

    <form method="POST">
        <input name="first" placeholder="First Name" required><br>
        <input name="middle" placeholder="Middle Name"><br>
        <input name="last" placeholder="Last Name" required><br>

        <input name="street" placeholder="Street Address" required><br>
        <input name="city" placeholder="City" required><br>
        <input name="state" placeholder="State" required><br>
        <input name="zip" placeholder="Zip Code" required><br>

        <input name="checking" placeholder="Checking Deposit" required><br>
        <input name="savings" placeholder="Savings Deposit" required><br>

        <button type="submit">Create Account</button>
    </form>

    <a href="/"><button>Back</button></a>
</div>

</body>
</html>
